<!DOCTYPE html>
<html>
  <head>
    <title>Пример подключения плеера</title>
    <meta charset="utf-8">
    <link rel="icon" href="static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="static/fonts/font-awesome.min.css">
    <link rel="stylesheet" href="static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="player" class="player">
      <div class="js-video-container video-container"></div>
      <!-- Here can be placed player controls: play and volume buttons -->
      <div class="control-buttons">
        <button class="js-play-button control-button">
          <i class="fa fa-play"></i>
        </button>
        <button class="js-pause-button control-button" hidden>
          <i class="fa fa-pause"></i>
        </button>
        <button class="js-volume-button control-button">
          <i class="fa fa-volume-off"></i>
        </button>
        <button class="js-mute-button control-button" hidden>
          <i class="fa fa-volume-up"></i>
        </button>
        <span class="js-current-time time-label">0:00:00</span>
        <div style="flex-grow: 1;"></div>
        <div class="right-controls">
          <span class="js-duration time-label">0:00:00</span>
          <button class="js-fullscreen-button control-button">
            <i class="fa fa-expand"></i>
          </button>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
    <script src="static/player.js"></script>
    <script type="text/javascript">createPlayer({elementId: 'player'});</script>
  </body>
</html>
